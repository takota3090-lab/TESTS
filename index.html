<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplayer Charades</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: Arial; text-align: center; background:#f5f5f5; }
input, button { padding:10px; margin:5px; border-radius:8px; }
button { cursor:pointer; }
#game { display:none; }
</style>
</head>
<body>

<h2>🎮 Multiplayer Charades</h2>

<div id="menu">
  <input id="name" placeholder="اسمك">
  <br>
  <button onclick="createRoom()">إنشاء غرفة</button>
  <br>
  <input id="room" placeholder="كود الغرفة">
  <br>
  <button onclick="joinRoom()">دخول</button>
</div>

<div id="game">
  <h3 id="roomCode"></h3>
  <h1 id="word">---</h1>
  <button onclick="newWord()">كلمة جديدة (Host)</button>

  <h3>اللاعبين:</h3>
  <ul id="players"></ul>
</div>

<script>
// Avoid redeclaration issue
let supabaseClient = window.supabase?.createClient(
  "https://mwjdmbcdysvkzdoluyzw.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
);

let roomCode = null;
let playerName = null;
let isHost = false;

const words = ["جمل","سيارة","طيارة","قلم","حصان","أسد"];

function randomWord(){
 return words[Math.floor(Math.random()*words.length)];
}

function generateCode(){
 return Math.random().toString(36).substring(2,7).toUpperCase();
}

async function createRoom(){
 playerName = document.getElementById("name").value;
 if(!playerName) return alert("اكتب اسمك");

 roomCode = generateCode();
 isHost = true;

 await supabaseClient.from("rooms").insert({
  code: roomCode,
  host_name: playerName,
  current_word: ""
 });

 await supabaseClient.from("players").insert({
  room_code: roomCode,
  name: playerName,
  is_host: true
 });

 startGame();
}

async function joinRoom(){
 playerName = document.getElementById("name").value;
 roomCode = document.getElementById("room").value.toUpperCase();

 if(!playerName || !roomCode) return alert("أكمل البيانات");

 const { data } = await supabaseClient
 .from("rooms")
 .select("*")
 .eq("code", roomCode)
 .single();

 if(!data) return alert("الغرفة غير موجودة");

 await supabaseClient.from("players").insert({
  room_code: roomCode,
  name: playerName,
  is_host: false
 });

 startGame();
}

function startGame(){
 document.getElementById("menu").style.display="none";
 document.getElementById("game").style.display="block";
 document.getElementById("roomCode").innerText="Room: "+roomCode;

 listenRoom();
 listenPlayers();
}

function listenRoom(){
 supabaseClient.channel("room-"+roomCode)
 .on("postgres_changes",{
  event:"*",
  schema:"public",
  table:"rooms",
  filter:`code=eq.${roomCode}`
 },payload=>{
  if(payload.new.current_word){
   document.getElementById("word").innerText = payload.new.current_word;
  }
 })
 .subscribe();
}

function listenPlayers(){
 supabaseClient.channel("players-"+roomCode)
 .on("postgres_changes",{
  event:"*",
  schema:"public",
  table:"players",
  filter:`room_code=eq.${roomCode}`
 },loadPlayers)
 .subscribe();

 loadPlayers();
}

async function loadPlayers(){
 const { data } = await supabaseClient
 .from("players")
 .select("*")
 .eq("room_code", roomCode);

 const list = document.getElementById("players");
 list.innerHTML = "";

 data.forEach(p=>{
  const li = document.createElement("li");
  li.innerText = p.name + " ("+p.score+")";
  list.appendChild(li);
 });
}

async function newWord(){
 if(!isHost) return alert("فقط الهوست يغير الكلمة");

 const w = randomWord();

 await supabaseClient.from("rooms").update({
  current_word: w
 }).eq("code", roomCode);
}
</script>

</body>
</html>
