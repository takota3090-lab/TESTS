<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>لعبة التمثيل - نظام الغرف | تصميم سعود</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Tajawal', sans-serif;
      background: #FFFFFF;
    }
    .app-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      background: #FFFFFF;
    }
    .tab-navigation {
      display: flex;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.6rem;
      background: #FFFFFF;
      border-bottom: 1px solid rgba(198, 93, 59, 0.15);
      flex-wrap: wrap;
    }
    .tab-btn {
      background: transparent;
      border: 1px solid rgba(198, 93, 59, 0.3);
      padding: 6px 16px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.8rem;
      color: #8B6B5C;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, #C65D3B 0%, #A84A2F 100%);
      color: white;
      border-color: #C65D3B;
    }
    .tab-content {
      flex: 1;
      overflow: hidden;
      padding: 0.8rem;
    }
    .tab-pane {
      display: none;
      height: 100%;
      overflow-y: auto;
    }
    .tab-pane.active-pane {
      display: block;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 1.2rem;
      text-align: center;
      border: 1px solid rgba(198, 93, 59, 0.2);
      box-shadow: 0 4px 20px rgba(107, 45, 45, 0.1);
      max-width: 500px;
      margin: 0 auto;
    }
    .room-code {
      font-size: 2rem;
      font-weight: 800;
      font-family: monospace;
      color: #C65D3B;
      letter-spacing: 2px;
      background: #f5f5f5;
      padding: 12px;
      border-radius: 12px;
      margin: 0.5rem 0;
    }
    .copy-btn {
      background: #6B2D2D;
      border: none;
      padding: 6px 16px;
      border-radius: 20px;
      color: white;
      cursor: pointer;
      font-size: 0.8rem;
      margin: 0.5rem;
    }
    .btn-primary {
      background: linear-gradient(135deg, #C65D3B 0%, #A84A2F 100%);
      border: none;
      padding: 12px 24px;
      border-radius: 50px;
      color: white;
      font-weight: 700;
      cursor: pointer;
      margin: 0.5rem;
    }
    .instruction-box {
      background: rgba(198, 93, 59, 0.1);
      border-radius: 16px;
      padding: 1rem;
      margin: 1rem 0;
      text-align: right;
    }
    .instruction-box h3 {
      color: #C65D3B;
      margin-bottom: 0.5rem;
    }
    .instruction-box li {
      margin: 0.5rem 0;
      font-size: 0.85rem;
    }
    .word-card {
      background: white;
      border-radius: 20px;
      padding: 1.5rem;
      text-align: center;
      border: 2px solid rgba(198, 93, 59, 0.2);
      margin: 1rem 0;
    }
    .current-word {
      font-size: 1.8rem;
      font-weight: 800;
      color: #4A1F1F;
    }
    .timer-number {
      font-size: 2.5rem;
      font-weight: 900;
      color: #C65D3B;
    }
    .action-buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.6rem;
      margin: 1rem 0;
    }
    .btn-action {
      background: white;
      border: 1px solid rgba(198, 93, 59, 0.3);
      padding: 10px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-success { background: #2D6A4F; color: white; border: none; }
    .btn-skip { background: #B83B3B; color: white; border: none; }
    .viewer-banner {
      background: linear-gradient(135deg, #6B2D2D, #C65D3B);
      color: white;
      padding: 8px;
      border-radius: 12px;
      text-align: center;
      margin-bottom: 1rem;
    }
    @media (max-width: 640px) {
      .current-word { font-size: 1.3rem; }
      .action-buttons { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="tab-navigation">
    <button class="tab-btn" data-tab="home"><i class="fas fa-home"></i> الرئيسية</button>
    <button class="tab-btn" data-tab="host"><i class="fas fa-chalkboard-user"></i> استضافة</button>
    <button class="tab-btn" data-tab="game"><i class="fas fa-mask"></i> اللعبة</button>
    <button class="tab-btn" data-tab="teams"><i class="fas fa-users"></i> الفرق</button>
  </div>

  <div class="tab-content">
    <!-- Home Tab -->
    <div class="tab-pane active-pane" id="homeTab">
      <div class="card">
        <i class="fas fa-theater-masks" style="font-size: 2rem; color: #C65D3B;"></i>
        <h1 style="color: #6B2D2D; margin: 0.5rem 0;">لعبة التمثيل</h1>
        <div class="instruction-box">
          <h3><i class="fas fa-info-circle"></i> كيف تلعب؟</h3>
          <ul style="list-style: none;">
            <li><i class="fas fa-chalkboard-user"></i> <strong>المضيف:</strong> اضغط "استضافة" → أنشئ غرفة → انسخ الرابط وأرسله للأصدقاء</li>
            <li><i class="fas fa-eye"></i> <strong>المشاهد:</strong> افتح الرابط أو أدخل رمز الغرفة في تبويب اللعبة</li>
            <li><i class="fas fa-hourglass-start"></i> <strong>المضيف</strong> يتحكم ببدء المؤقت والتخطي والتخمين</li>
            <li><i class="fas fa-trophy"></i> أول فريق يصل 10 نقاط يفوز</li>
          </ul>
        </div>
        <button class="btn-primary" id="startHostBtn"><i class="fas fa-chalkboard-user"></i> استضافة لعبة</button>
      </div>
    </div>

    <!-- Host Tab -->
    <div class="tab-pane" id="hostTab">
      <div class="card" id="hostContent"></div>
    </div>

    <!-- Game Tab -->
    <div class="tab-pane" id="gameTab">
      <div class="card" id="gameContent"></div>
    </div>

    <!-- Teams Tab -->
    <div class="tab-pane" id="teamsTab">
      <div class="card">
        <h3><i class="fas fa-users"></i> الفرق</h3>
        <div id="teamList"></div>
        <div style="display: flex; gap: 8px; margin-top: 1rem;">
          <input type="text" id="teamName" placeholder="اسم الفريق" style="flex: 1; padding: 8px; border-radius: 50px; border: 1px solid #ddd;">
          <button id="addTeam" style="background: #C65D3B; border: none; padding: 8px 16px; border-radius: 50px; color: white;">إضافة</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // ==================== GAME DATA ====================
  const categories = {
    "أفعال": ["يرقص","يغني","يأكل","يشرب","يركض","يقفز","يضحك","يبكي","ينام","يقرأ","يكتب","يرسم"],
    "حيوانات": ["جمل","صقر","حصان","نمر","أسد","فيل","زرافة","قط","كلب","ثعبان","عقاب","دolphin"],
    "أمثال": ["الجار قبل الدار", "الصبر مفتاح الفرج", "العين بصيرة", "القناعة كنز", "الكذب ملح الرجال"],
    "أشياء": ["تلفون","سيارة","كتاب","قلم","كرسي","طاولة","مفتاح","ساعة","نظارة","حقيبة"]
  };
  
  let currentWord = { word: "ابدأ اللعبة", category: "أفعال" };
  let timeLeft = 60;
  let timerRunning = false;
  let timerInterval = null;
  let roundCount = 0;
  let gameActive = true;
  let gameWinner = null;
  let teams = [{ id: 1, name: "الفريق الأحمر", score: 0 }, { id: 2, name: "الفريق الأزرق", score: 0 }];
  
  // Room system
  let roomId = null;
  let isHost = false;
  
  function getRandomWord() {
    const cats = Object.keys(categories);
    const randomCat = cats[Math.floor(Math.random() * cats.length)];
    const words = categories[randomCat];
    return { word: words[Math.floor(Math.random() * words.length)], category: randomCat };
  }
  
  // Save game state to localStorage for viewers
  function saveGameState() {
    if (roomId) {
      const state = {
        word: currentWord.word,
        category: currentWord.category,
        timeLeft: timeLeft,
        roundCount: roundCount,
        gameActive: gameActive,
        gameWinner: gameWinner,
        teams: teams
      };
      localStorage.setItem(`room_${roomId}`, JSON.stringify(state));
    }
  }
  
  // Load game state for viewers
  function loadGameState() {
    if (!isHost && roomId) {
      const saved = localStorage.getItem(`room_${roomId}`);
      if (saved) {
        const state = JSON.parse(saved);
        currentWord = { word: state.word, category: state.category };
        timeLeft = state.timeLeft;
        roundCount = state.roundCount;
        gameActive = state.gameActive;
        gameWinner = state.gameWinner;
        teams = state.teams;
        renderGameUI();
        renderTeamList();
      }
    }
  }
  
  // Sync periodically for viewers
  setInterval(() => {
    if (!isHost && roomId) {
      loadGameState();
    }
  }, 1000);
  
  // Timer functions
  function stopTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerRunning = false;
  }
  
  function startTimer() {
    if (timerRunning || !gameActive || gameWinner) return;
    if (timeLeft <= 0) timeLeft = 60;
    stopTimer();
    timerRunning = true;
    timerInterval = setInterval(() => {
      if (timeLeft <= 0) {
        stopTimer();
      } else {
        timeLeft--;
        if (isHost) saveGameState();
        updateTimerDisplay();
      }
    }, 1000);
  }
  
  function updateTimerDisplay() {
    document.querySelectorAll('.timer-display').forEach(el => el.innerText = timeLeft);
  }
  
  // Word refresh
  function refreshWord() {
    currentWord = getRandomWord();
    document.querySelectorAll('.word-display').forEach(el => el.innerText = currentWord.word);
    document.querySelectorAll('.cat-display').forEach(el => el.innerText = `📂 ${currentWord.category}`);
    if (isHost) saveGameState();
  }
  
  function skipWord() {
    if (!gameActive || gameWinner) return;
    roundCount++;
    refreshWord();
    stopTimer();
    timeLeft = 60;
    timerRunning = false;
    updateTimerDisplay();
    document.querySelectorAll('.round-display').forEach(el => el.innerText = roundCount);
    if (isHost) saveGameState();
  }
  
  // Team functions
  function addTeam(name) {
    if (!name.trim()) return;
    teams.push({ id: Date.now(), name: name.trim(), score: 0 });
    renderTeamList();
    saveTeams();
  }
  
  function updateTeamScore(teamId, delta) {
    const team = teams.find(t => t.id === teamId);
    if (team) {
      team.score = Math.max(0, team.score + delta);
      renderTeamList();
      saveTeams();
      if (team.score >= 10 && !gameWinner) {
        gameWinner = team.id;
        gameActive = false;
        stopTimer();
        alert(`🏆 الفائز: ${team.name} 🏆`);
        if (isHost) saveGameState();
        renderGameUI();
      }
      if (isHost) saveGameState();
    }
  }
  
  function saveTeams() {
    localStorage.setItem('teams', JSON.stringify(teams));
  }
  
  function renderTeamList() {
    const container = document.getElementById('teamList');
    if (!container) return;
    container.innerHTML = teams.map(team => `
      <div style="display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #eee;">
        <div><strong>${team.name}</strong> <span style="color: #C65D3B; font-weight: bold;">${team.score}</span></div>
        <div>
          <button onclick="updateTeamScore(${team.id}, -1)" style="background: #eee; border: none; padding: 4px 8px; border-radius: 8px;">-</button>
          <button onclick="updateTeamScore(${team.id}, 1)" style="background: #C65D3B; border: none; padding: 4px 8px; border-radius: 8px; color: white;">+</button>
          <button onclick="deleteTeam(${team.id})" style="background: #B83B3B; border: none; padding: 4px 8px; border-radius: 8px; color: white;">🗑</button>
        </div>
      </div>
    `).join('');
  }
  
  function deleteTeam(id) {
    teams = teams.filter(t => t.id !== id);
    renderTeamList();
    saveTeams();
  }
  
  function resetGame() {
    teams.forEach(t => t.score = 0);
    roundCount = 0;
    timeLeft = 60;
    timerRunning = false;
    gameActive = true;
    gameWinner = null;
    stopTimer();
    refreshWord();
    updateTimerDisplay();
    document.querySelectorAll('.round-display').forEach(el => el.innerText = roundCount);
    renderTeamList();
    saveTeams();
    if (isHost) saveGameState();
  }
  
  // Team selection modal for scoring
  function showTeamSelection(callback) {
    const modal = document.createElement('div');
    modal.style.cssText = 'position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 1000;';
    modal.innerHTML = `
      <div style="background: white; border-radius: 24px; padding: 1.5rem; width: 80%; max-width: 300px; text-align: center;">
        <h3 style="margin-bottom: 1rem;">اختر الفريق الفائز</h3>
        ${teams.map(team => `<div style="padding: 10px; margin: 5px 0; background: #f5f5f5; border-radius: 12px; cursor: pointer;" onclick="window.selectTeam(${team.id})">${team.name}</div>`).join('')}
        <button onclick="closeModal()" style="margin-top: 1rem; padding: 8px 16px; background: #ddd; border: none; border-radius: 20px;">إلغاء</button>
      </div>
    `;
    document.body.appendChild(modal);
    window.selectTeam = (teamId) => {
      callback(teamId);
      modal.remove();
    };
    window.closeModal = () => modal.remove();
  }
  
  function guessCorrect() {
    if (!gameActive || gameWinner) return;
    stopTimer();
    showTeamSelection((teamId) => {
      const team = teams.find(t => t.id === teamId);
      if (team) {
        team.score++;
        renderTeamList();
        saveTeams();
        if (team.score >= 10) {
          gameWinner = team.id;
          gameActive = false;
          alert(`🏆 الفائز: ${team.name} 🏆`);
          if (isHost) saveGameState();
          renderGameUI();
          return;
        }
      }
      roundCount++;
      document.querySelectorAll('.round-display').forEach(el => el.innerText = roundCount);
      refreshWord();
      timeLeft = 60;
      timerRunning = false;
      updateTimerDisplay();
      if (isHost) saveGameState();
    });
  }
  
  // ==================== UI RENDERING ====================
  function renderHostUI() {
    const container = document.getElementById('hostContent');
    const inviteLink = `${window.location.href.split('?')[0]}?room=${roomId}`;
    container.innerHTML = `
      <h3><i class="fas fa-chalkboard-user"></i> أنت المضيف</h3>
      <div class="instruction-box" style="background: #2D6A4F; color: white;">
        <i class="fas fa-info-circle"></i> شارك هذا الرابط مع أصدقائك
      </div>
      <div class="room-code">${roomId}</div>
      <button class="copy-btn" id="copyLinkBtn"><i class="fas fa-copy"></i> نسخ رابط الدعوة</button>
      <button class="copy-btn" id="copyCodeBtn" style="background: #C65D3B;"><i class="fas fa-key"></i> نسخ الرمز</button>
      
      <div class="word-card">
        <div class="current-word word-display">${currentWord.word}</div>
        <div class="cat-display" style="margin-top: 8px; font-size: 0.8rem; color: #C65D3B;">📂 ${currentWord.category}</div>
      </div>
      
      <div class="timer-area">
        <div class="timer-number timer-display">${timeLeft}</div>
        <div>ثانية</div>
      </div>
      
      <div class="action-buttons">
        <button class="btn-action" id="hostStartTimer"><i class="fas fa-hourglass-start"></i> بدء المؤقت</button>
        <button class="btn-action btn-skip" id="hostSkip"><i class="fas fa-forward"></i> تخطي</button>
        <button class="btn-action btn-success" id="hostGuess"><i class="fas fa-check-circle"></i> تم التخمين</button>
        <button class="btn-action" id="hostReset"><i class="fas fa-redo-alt"></i> لعبة جديدة</button>
      </div>
      
      <div class="stats-row" style="display: flex; justify-content: space-between; margin-top: 1rem;">
        <span><i class="fas fa-redo-alt"></i> جولة: <strong class="round-display">${roundCount}</strong></span>
        <span><i class="fas fa-flag-checkered"></i> الهدف: 10 نقاط</span>
      </div>
    `;
    
    document.getElementById('copyLinkBtn')?.addEventListener('click', () => {
      navigator.clipboard.writeText(inviteLink);
      alert('✅ تم نسخ الرابط! أرسله لأصدقائك عبر واتساب أو أي تطبيق.');
    });
    document.getElementById('copyCodeBtn')?.addEventListener('click', () => {
      navigator.clipboard.writeText(roomId);
      alert('✅ تم نسخ الرمز: ' + roomId);
    });
    document.getElementById('hostStartTimer')?.addEventListener('click', () => startTimer());
    document.getElementById('hostSkip')?.addEventListener('click', () => skipWord());
    document.getElementById('hostGuess')?.addEventListener('click', () => guessCorrect());
    document.getElementById('hostReset')?.addEventListener('click', () => resetGame());
  }
  
  function renderViewerUI() {
    const container = document.getElementById('gameContent');
    container.innerHTML = `
      <div class="viewer-banner">
        <i class="fas fa-eye"></i> أنت في وضع المشاهد | غرفة: <strong>${roomId}</strong>
      </div>
      <div class="word-card">
        <div class="current-word word-display">${currentWord.word}</div>
        <div class="cat-display" style="margin-top: 8px; font-size: 0.8rem; color: #C65D3B;">📂 ${currentWord.category}</div>
      </div>
      <div class="timer-area">
        <div class="timer-number timer-display">${timeLeft}</div>
        <div>ثانية</div>
      </div>
      <div class="stats-row" style="display: flex; justify-content: space-between; margin-top: 1rem;">
        <span><i class="fas fa-redo-alt"></i> جولة: <strong class="round-display">${roundCount}</strong></span>
        <span><i class="fas fa-flag-checkered"></i> الهدف: 10 نقاط</span>
      </div>
      <div class="instruction-box" style="margin-top: 1rem; text-align: center;">
        <i class="fas fa-info-circle"></i> أنت تشاهد اللعبة. المضيف هو من يتحكم بالمؤقت والكلمات.
      </div>
    `;
  }
  
  function renderGameUI() {
    if (isHost) {
      renderHostUI();
    } else {
      renderViewerUI();
    }
  }
  
  // ==================== ROOM MANAGEMENT ====================
  function createRoom() {
    roomId = Math.random().toString(36).substring(2, 8).toUpperCase();
    isHost = true;
    localStorage.setItem('host_room', roomId);
    localStorage.setItem('is_host', 'true');
    currentWord = getRandomWord();
    roundCount = 0;
    timeLeft = 60;
    gameActive = true;
    gameWinner = null;
    teams.forEach(t => t.score = 0);
    saveGameState();
    renderHostUI();
    switchToTab('host');
  }
  
  function joinRoom(code) {
    if (!code) {
      code = prompt("🔑 أدخل رمز الغرفة:", "");
    }
    if (code) {
      roomId = code.toUpperCase();
      isHost = false;
      localStorage.setItem('viewer_room', roomId);
      loadGameState();
      renderViewerUI();
      switchToTab('game');
    }
  }
  
  function checkRoomFromURL() {
    const params = new URLSearchParams(window.location.search);
    const room = params.get('room');
    if (room) {
      roomId = room.toUpperCase();
      isHost = false;
      loadGameState();
      renderViewerUI();
      switchToTab('game');
    }
  }
  
  // ==================== TAB SWITCHING ====================
  function switchToTab(tabId) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active-pane'));
    document.querySelector(`.tab-btn[data-tab="${tabId}"]`).classList.add('active');
    document.getElementById(`${tabId}Tab`).classList.add('active-pane');
    
    if (tabId === 'teams') renderTeamList();
    if (tabId === 'game') renderGameUI();
    if (tabId === 'host' && isHost) renderHostUI();
  }
  
  // Event Listeners
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchToTab(btn.dataset.tab));
  });
  
  document.getElementById('startHostBtn')?.addEventListener('click', () => {
    createRoom();
  });
  
  document.getElementById('addTeam')?.addEventListener('click', () => {
    const input = document.getElementById('teamName');
    if (input.value.trim()) {
      addTeam(input.value.trim());
      input.value = '';
    }
  });
  
  // Expose functions globally
  window.updateTeamScore = updateTeamScore;
  window.deleteTeam = deleteTeam;
  window.selectTeam = null;
  
  // Initialize
  const savedTeams = localStorage.getItem('teams');
  if (savedTeams) teams = JSON.parse(savedTeams);
  renderTeamList();
  checkRoomFromURL();
  
  // Check if user is a host from previous session
  const savedHostRoom = localStorage.getItem('host_room');
  if (savedHostRoom && !roomId) {
    roomId = savedHostRoom;
    isHost = true;
    loadGameState();
    renderHostUI();
  }
</script>
</body>
</html>
