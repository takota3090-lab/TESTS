<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>سوقي | قائمة تسوق ذكية بريميوم</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --whatsapp: #25D366;
            --bg-primary: #ffffff;
            --bg-secondary: #f9fafb;
            --bg-tertiary: #f3f4f6;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            --border: #e5e7eb;
            --gradient-primary: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --gradient-success: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --radius: 16px;
            --radius-lg: 24px;
            --radius-sm: 12px;
        }

        body {
            font-family: 'Inter', 'Cairo', sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 14px;
            overflow-x: hidden;
            width: 100%;
            max-width: 100vw;
            padding-top: 72px;
        }

        body[dir="ltr"] { text-align: left; }
        body[dir="rtl"] { text-align: right; }

        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary-light);
            border-radius: 10px;
        }

        /* Premium Fixed Header */
        .premium-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1100;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--gradient-primary);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1rem;
        }
        .logo-text {
            font-weight: 800;
            font-size: 1.1rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .lang-switch {
            display: flex;
            gap: 4px;
            background: var(--bg-tertiary);
            border-radius: 40px;
            padding: 4px;
        }
        .lang-btn {
            padding: 6px 14px;
            border-radius: 32px;
            border: none;
            background: transparent;
            font-weight: 600;
            font-size: 0.7rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        .lang-btn.active {
            background: var(--gradient-primary);
            color: white;
            box-shadow: var(--shadow-sm);
        }

        /* Premium Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 12px;
            left: 12px;
            right: 12px;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: var(--shadow-lg);
            padding: 8px 16px;
            display: flex;
            justify-content: space-around;
            z-index: 1000;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
            font-size: 0.65rem;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .nav-item i { font-size: 1.2rem; }
        .nav-item.active { 
            color: white;
            background: var(--gradient-primary);
            box-shadow: var(--shadow-md);
        }
        .nav-item.active i { color: white; }

        .page {
            display: none;
            min-height: 100vh;
            padding-bottom: 90px;
            width: 100%;
            animation: fadeIn 0.3s ease;
        }
        .page.active { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            padding: 16px;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Premium User Card */
        .user-card-premium {
            background: var(--gradient-primary);
            border-radius: var(--radius-lg);
            padding: 16px 20px;
            margin-bottom: 20px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
        }
        .user-card-premium::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            pointer-events: none;
        }
        .user-avatar {
            width: 48px;
            height: 48px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }
        .user-info h3 { font-size: 1rem; font-weight: 800; margin-bottom: 4px; }
        .user-info p { font-size: 0.7rem; opacity: 0.85; }
        .badge {
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .logout-btn:hover { background: rgba(255,255,255,0.3); }

        /* Premium Quick Add */
        .quick-add-premium {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            padding: 12px 16px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
        }
        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .premium-input {
            flex: 1;
            background: var(--bg-tertiary);
            border: 1px solid transparent;
            border-radius: 40px;
            padding: 14px 18px;
            font-size: 0.9rem;
            font-family: inherit;
            transition: all 0.2s;
        }
        .premium-input:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--bg-primary);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
        }
        .premium-btn {
            background: var(--gradient-primary);
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s;
        }
        .premium-btn:active { transform: scale(0.98); }
        .voice-btn {
            background: var(--bg-tertiary);
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            cursor: pointer;
            color: var(--primary);
            font-size: 1.2rem;
            transition: all 0.2s;
        }
        .voice-btn:hover { background: var(--primary); color: white; }

        /* Stats Cards */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--bg-primary);
            border-radius: var(--radius);
            padding: 12px;
            text-align: center;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }
        .stat-number {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
        }
        .stat-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        /* Item List Premium */
        .items-list-premium {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            overflow: hidden;
            margin-bottom: 16px;
        }
        .section-header {
            padding: 16px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border);
            font-weight: 800;
            font-size: 0.85rem;
        }
        .categorized-scroll {
            max-height: 400px;
            overflow-y: auto;
        }
        .category-group {
            border-bottom: 1px solid var(--border);
        }
        .category-header-premium {
            padding: 12px 16px;
            background: var(--bg-secondary);
            font-weight: 800;
            font-size: 0.75rem;
            color: var(--primary);
            letter-spacing: 0.5px;
        }
        .list-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px solid var(--border);
        }
        .list-item:hover { background: var(--bg-tertiary); }
        .item-checkbox-premium {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .item-checkbox-premium.checked {
            background: var(--success);
            border-color: var(--success);
        }
        .item-checkbox-premium i { color: white; font-size: 0.7rem; opacity: 0; transition: opacity 0.2s; }
        .item-checkbox-premium.checked i { opacity: 1; }
        .item-info { flex: 1; display: flex; align-items: center; gap: 10px; }
        .item-icon { font-size: 1.1rem; width: 28px; text-align: center; }
        .item-name { font-weight: 600; font-size: 0.9rem; }
        .item-name.completed { text-decoration: line-through; color: var(--text-muted); }
        .delete-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            background: var(--bg-tertiary);
            cursor: pointer;
            color: var(--danger);
            transition: all 0.2s;
        }
        .delete-btn:hover { background: #fee2e2; }

        /* Progress Bar Premium */
        .progress-premium {
            background: var(--bg-primary);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }
        .progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .progress-bar-bg {
            height: 8px;
            background: var(--bg-tertiary);
            border-radius: 100px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--gradient-primary);
            border-radius: 100px;
            transition: width 0.3s ease;
        }

        /* Category Grid Premium */
        .category-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .category-card-premium {
            background: var(--bg-primary);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: all 0.2s;
        }
        .category-trigger {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            cursor: pointer;
            background: var(--bg-primary);
        }
        .category-icon-bg {
            width: 44px;
            height: 44px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }
        .category-name { font-weight: 700; font-size: 0.9rem; flex: 1; }
        .chevron {
            color: var(--text-muted);
            transition: transform 0.3s;
        }
        .chevron.expanded { transform: rotate(180deg); }
        .category-items-panel {
            display: none;
            padding: 16px;
            border-top: 1px solid var(--border);
            background: var(--bg-secondary);
        }
        .category-items-panel.show { display: block; }
        .item-buttons-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .item-select-btn {
            padding: 10px 12px;
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .item-select-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Modal Premium */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.show { display: flex; }
        .modal-content {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 340px;
            padding: 24px;
            text-align: center;
            box-shadow: var(--shadow-xl);
        }
        .modal-content h3 { margin-bottom: 16px; font-size: 1.3rem; }
        .modal-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: inherit;
            background: var(--bg-tertiary);
        }
        .modal-btn {
            background: var(--gradient-primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: var(--radius-sm);
            width: 100%;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .modal-link {
            color: var(--primary);
            cursor: pointer;
            font-size: 0.8rem;
        }

        /* Voice Modal Premium */
        .voice-modal-premium {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 24px;
        }
        .voice-modal-premium.show { display: flex; }
        .voice-circle-premium {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            animation: pulse 1.5s infinite;
            box-shadow: var(--shadow-xl);
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(99,102,241,0.4); }
            50% { transform: scale(1.1); box-shadow: 0 0 0 20px rgba(99,102,241,0); }
        }
        .voice-text { color: white; font-weight: 600; font-size: 1rem; }
        .cancel-voice {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .toast-premium {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--text-primary);
            color: white;
            border-radius: 40px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 3000;
            opacity: 0;
            transition: 0.3s;
            font-size: 0.85rem;
            white-space: nowrap;
            box-shadow: var(--shadow-lg);
        }
        .toast-premium.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        .empty-state-premium {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }
        .empty-state-premium i { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }
    </style>
</head>
<body dir="rtl">
    <div class="premium-header">
        <div class="logo-area">
            <div class="logo-icon"><i class="fas fa-cart-shopping"></i></div>
            <div class="logo-text" id="logoText">سوقي</div>
        </div>
        <div class="lang-switch">
            <button class="lang-btn active" id="langAr">عربى</button>
            <button class="lang-btn" id="langEn">ENG</button>
        </div>
    </div>

    <div class="modal-overlay" id="authModal">
        <div class="modal-content">
            <h3 id="authTitle">إنشاء حساب</h3>
            <input type="text" id="authName" class="modal-input" placeholder="الاسم">
            <input type="password" id="authPassword" class="modal-input" placeholder="كلمة المرور">
            <button class="modal-btn" id="authSubmitBtn">تسجيل</button>
            <p id="authSwitchText" class="modal-link">لديك حساب؟ تسجيل دخول</p>
        </div>
    </div>

    <div class="voice-modal-premium" id="voiceModal">
        <div class="voice-circle-premium"><i class="fas fa-microphone-alt"></i></div>
        <div class="voice-text" id="voiceListeningText">جاري الاستماع...</div>
        <button class="cancel-voice" onclick="stopVoiceInput()">إلغاء</button>
    </div>

    <div class="toast-premium" id="toast"><i class="fas fa-check-circle"></i><span id="toastMessage"></span></div>

    <!-- Home Page -->
    <div class="page active" id="homePage">
        <div class="container">
            <div class="user-card-premium" id="userCard">
                <div class="user-avatar"><i class="fas fa-user-alt"></i></div>
                <div class="user-info">
                    <h3 id="userNameDisplay">زائر</h3>
                    <p id="userStatusText">غير مسجل</p>
                </div>
                <button class="logout-btn" id="authBtn"><i class="fas fa-sign-in-alt"></i> <span id="authBtnText">دخول</span></button>
            </div>

            <div class="stats-row" id="statsRow">
                <div class="stat-card"><div class="stat-number" id="totalItems">0</div><div class="stat-label" id="totalLabel">الكل</div></div>
                <div class="stat-card"><div class="stat-number" id="activeItems">0</div><div class="stat-label" id="activeLabel">متبقي</div></div>
                <div class="stat-card"><div class="stat-number" id="completedItems">0</div><div class="stat-label" id="completedLabel">مكتمل</div></div>
            </div>

            <div class="quick-add-premium">
                <div class="input-group">
                    <input type="text" id="homeQuickItem" class="premium-input" placeholder="اكتب عنصراً..." onkeypress="handleHomeQuickAdd(event)">
                    <button class="premium-btn" id="addBtn" onclick="addHomeQuickItem()"><i class="fas fa-plus"></i> <span id="addBtnText">أضف</span></button>
                    <button class="voice-btn" id="voiceBtn"><i class="fas fa-microphone-alt"></i></button>
                </div>
            </div>

            <div class="items-list-premium">
                <div class="section-header"><i class="fas fa-clipboard-list"></i> <span id="activeListTitle">العناصر النشطة</span></div>
                <div class="categorized-scroll" id="categorizedActiveList"></div>
                <button class="share-main-btn premium-btn" style="margin: 12px; width: calc(100% - 24px); background: var(--whatsapp);" id="shareBtn"><i class="fab fa-whatsapp"></i> <span id="shareBtnText">مشاركة القائمة</span></button>
            </div>
        </div>
    </div>

    <!-- Quick Add Page -->
    <div class="page" id="quickPage">
        <div class="container">
            <div class="section-header" style="margin-bottom: 16px;"><i class="fas fa-layer-group"></i> <span id="quickTitle">إضافة بالفئات</span></div>
            <div class="category-grid" id="categoriesContainer"></div>
        </div>
    </div>

    <!-- All Items Page -->
    <div class="page" id="listPage">
        <div class="container">
            <div class="progress-premium">
                <div class="progress-header"><span id="progressLabel">تقدم التسوق</span><span id="progressPercent">0%</span></div>
                <div class="progress-bar-bg"><div class="progress-fill" id="progressFill"></div></div>
            </div>
            <div class="items-list-premium">
                <div class="section-header"><i class="fas fa-list-ul"></i> <span id="allItemsTitle">جميع العناصر</span></div>
                <div id="allItemsList"></div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="showPage('home')"><i class="fas fa-home"></i><span id="navHome">الرئيسية</span></div>
        <div class="nav-item" onclick="showPage('quick')"><i class="fas fa-th-large"></i><span id="navQuick">الفئات</span></div>
        <div class="nav-item" onclick="showPage('list')"><i class="fas fa-list-check"></i><span id="navList">القائمة</span></div>
    </div>

    <script>
        // ========== DATA LAYER ==========
        let currentUser = JSON.parse(localStorage.getItem('soqi_current_user')) || null;
        let users = JSON.parse(localStorage.getItem('soqi_users')) || [];
        let items = [];
        let currentLang = 'ar';
        let authMode = 'register';
        let recognition = null;
        let isListening = false;

        const categoryItemsDB = {
