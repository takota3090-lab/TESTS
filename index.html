<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tap Race - Multiplayer</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
            overflow: hidden;
        }
        
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .subtitle {
            text-align: center;
            opacity: 0.9;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        
        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        .mode-btn {
            flex: 1;
            padding: 15px;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 15px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        
        .mode-btn.active {
            background: rgba(255,255,255,0.3);
            border-color: white;
            transform: scale(1.05);
        }
        
        .game-area {
            flex: 1;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .game-area.active {
            display: flex;
        }
        
        .room-code {
            background: rgba(0,0,0,0.3);
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 3px;
            margin-bottom: 20px;
            font-family: monospace;
        }
        
        .score-display {
            font-size: 5rem;
            font-weight: bold;
            text-shadow: 0 0 30px rgba(255,255,255,0.5);
            margin-bottom: 30px;
        }
        
        .tap-btn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, #ff6b6b, #ee5a5a);
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(238, 90, 90, 0.4);
            transition: transform 0.1s, box-shadow 0.1s;
            user-select: none;
            -webkit-user-select: none;
        }
        
        .tap-btn:active {
            transform: scale(0.95);
            box-shadow: 0 5px 15px rgba(238, 90, 90, 0.4);
        }
        
        .tap-btn:disabled {
            background: #666;
            cursor: not-allowed;
        }
        
        .viewer-count {
            margin-top: 20px;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        .join-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 300px;
        }
        
        .code-input {
            padding: 20px;
            font-size: 1.5rem;
            text-align: center;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 15px;
            outline: none;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-family: monospace;
        }
        
        .code-input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        .join-btn {
            padding: 18px;
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            color: white;
            border-radius: 15px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .join-btn:active {
            transform: scale(0.98);
            background: rgba(255,255,255,0.3);
        }
        
        .viewer-game {
            text-align: center;
        }
        
        .host-name {
            font-size: 1.2rem;
            margin-bottom: 10px;
            opacity: 0.9;
        }
        
        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,0,0,0.3);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        
        .pulse {
            width: 10px;
            height: 10px;
            background: #ff4444;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
        
        .viewer-score {
            font-size: 8rem;
            font-weight: bold;
            text-shadow: 0 0 50px rgba(255,255,255,0.3);
        }
        
        .taps-per-sec {
            font-size: 1.2rem;
            margin-top: 10px;
            opacity: 0.8;
        }
        
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        .status {
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        
        .status.error {
            background: rgba(255,0,0,0.3);
        }
        
        .status.success {
            background: rgba(0,255,0,0.3);
        }
        
        .instructions {
            text-align: center;
            opacity: 0.8;
            font-size: 0.9rem;
            margin-top: 20px;
            line-height: 1.5;
        }
        
        .leaderboard {
            margin-top: 30px;
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 15px;
            width: 100%;
            max-width: 300px;
        }
        
        .leaderboard h3 {
            margin-bottom: 15px;
            text-align: center;
        }
        
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ Tap Race</h1>
        <p class="subtitle">Real-time Multiplayer Tapping Game</p>
        
        <div id="mainMenu" class="mode-selector">
            <button class="mode-btn active" onclick="selectMode('host')">🎮 Host Game</button>
            <button class="mode-btn" onclick="selectMode('viewer')">👀 View Game</button>
        </div>
        
        <div id="statusMsg" class="status hidden"></div>
        
        <!-- Host Setup -->
        <div id="hostSetup" class="game-area">
            <div class="join-section">
                <p class="instructions">Create a room and start tapping!<br>Share the code with friends.</p>
                <button class="join-btn" onclick="createRoom()" style="margin-top: 20px;">Create Room</button>
            </div>
        </div>
        
        <!-- Host Game -->
        <div id="hostGame" class="game-area">
            <button class="back-btn" onclick="resetGame()">← Back</button>
            <div class="room-code" id="roomCodeDisplay">----</div>
            <div class="score-display" id="hostScore">0</div>
            <button class="tap-btn" id="tapBtn" onmousedown="handleTap()" ontouchstart="handleTap(event)">
                TAP!
            </button>
            <div class="viewer-count" id="viewerCount">0 viewers watching</div>
            <div class="instructions">Tap as fast as you can!</div>
        </div>
        
        <!-- Viewer Setup -->
        <div id="viewerSetup" class="game-area">
            <div class="join-section">
                <p class="instructions">Enter the 4-digit room code<br>to watch the game live</p>
                <input type="text" class="code-input" id="codeInput" maxlength="4" placeholder="0000">
                <button class="join-btn" onclick="joinRoom()">Join Room</button>
            </div>
        </div>
        
        <!-- Viewer Game -->
        <div id="viewerGame" class="game-area viewer-game">
            <button class="back-btn" onclick="resetGame()">← Back</button>
            <div class="live-indicator">
                <span class="pulse"></span>
                LIVE
            </div>
            <div class="host-name" id="hostName">Host's Game</div>
            <div class="viewer-score" id="viewerScore">0</div>
            <div class="taps-per-sec" id="tapsPerSec">0 taps/sec</div>
            <div class="instructions">Watching in real-time via Supabase</div>
        </div>
    </div>

    <script>
        // Supabase Configuration - YOUR CREDENTIALS
        const SUPABASE_URL = 'https://ryipodpanddlukxezvjm.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5aXBvZHBhbmRkbHVreGV6dmptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxNjY4MTMsImV4cCI6MjA4OTc0MjgxM30.kkZyToN7LrJZhf8zpzj_7hXSkyobjcfmYp-dV4b9aEY';
        
        // Initialize Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let currentMode = 'host';
        let roomCode = null;
        let score = 0;
        let subscription = null;
        let lastTapTime = Date.now();
        let tapTimes = [];
        
        function selectMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('hostSetup').classList.remove('active');
            document.getElementById('viewerSetup').classList.remove('active');
            
            if (mode === 'host') {
                document.getElementById('hostSetup').classList.add('active');
            } else {
                document.getElementById('viewerSetup').classList.add('active');
            }
        }
        
        function showStatus(msg, type) {
            const status = document.getElementById('statusMsg');
            status.textContent = msg;
            status.className = 'status ' + type;
            status.classList.remove('hidden');
            setTimeout(() => status.classList.add('hidden'), 3000);
        }
        
        async function createRoom() {
            roomCode = Math.floor(1000 + Math.random() * 9000).toString();
            
            try {
                // Create room in Supabase
                const { error } = await supabase
                    .from('tap_rooms')
                    .insert([
                        { 
                            code: roomCode, 
                            score: 0, 
                            host_id: crypto.randomUUID(),
                            updated_at: new Date().toISOString()
                        }
                    ]);
                
                if (error) throw error;
                
                document.getElementById('hostSetup').classList.remove('active');
                document.getElementById('hostGame').classList.add('active');
                document.getElementById('roomCodeDisplay').textContent = roomCode;
                
                // Subscribe to viewer count
                subscribeToViewers();
                
                showStatus('Room created! Share code: ' + roomCode, 'success');
                
            } catch (err) {
                showStatus('Error creating room: ' + err.message, 'error');
                console.error(err);
            }
        }
        
        async function handleTap(e) {
            if (e) e.preventDefault();
            
            score++;
            document.getElementById('hostScore').textContent = score;
            
            // Calculate taps per second
            const now = Date.now();
            tapTimes.push(now);
            tapTimes = tapTimes.filter(t => now - t < 1000);
            
            // Update in Supabase (throttled to every 100ms)
            if (now - lastTapTime > 100) {
                updateScore();
                lastTapTime = now;
            }
            
            // Visual feedback
            const btn = document.getElementById('tapBtn');
            btn.style.transform = 'scale(0.9)';
            setTimeout(() => btn.style.transform = 'scale(1)', 50);
        }
        
        async function updateScore() {
            if (!roomCode) return;
            
            try {
                await supabase
                    .from('tap_rooms')
                    .update({ 
                        score: score,
                        taps_per_sec: tapTimes.length,
                        updated_at: new Date().toISOString()
                    })
                    .eq('code', roomCode);
            } catch (err) {
                console.error('Update error:', err);
            }
        }
        
        function subscribeToViewers() {
            // Subscribe to changes to see viewer count (in real app, you'd track connections)
            supabase
                .channel('room-' + roomCode)
                .on('postgres_changes', { 
                    event: '*', 
                    schema: 'public', 
                    table: 'tap_rooms',
                    filter: 'code=eq.' + roomCode
                }, (payload) => {
                    // Handle updates if needed
                })
                .subscribe();
        }
        
        async function joinRoom() {
            const code = document.getElementById('codeInput').value.toUpperCase();
            
            if (code.length !== 4) {
                showStatus('Please enter a 4-digit code', 'error');
                return;
            }
            
            try {
                // Check if room exists
                const { data, error } = await supabase
                    .from('tap_rooms')
                    .select('*')
                    .eq('code', code)
                    .single();
                
                if (error || !data) {
                    showStatus('Room not found!', 'error');
                    return;
                }
                
                roomCode = code;
                
                document.getElementById('viewerSetup').classList.remove('active');
                document.getElementById('viewerGame').classList.add('active');
                
                // Start watching
                watchGame();
                
                showStatus('Connected to room ' + code, 'success');
                
            } catch (err) {
                showStatus('Error joining room', 'error');
                console.error(err);
            }
        }
        
        function watchGame() {
            // Subscribe to realtime updates
            subscription = supabase
                .channel('viewer-' + roomCode)
                .on('postgres_changes', { 
                    event: 'UPDATE', 
                    schema: 'public', 
                    table: 'tap_rooms',
                    filter: 'code=eq.' + roomCode
                }, (payload) => {
                    const newScore = payload.new.score;
                    const tps = payload.new.taps_per_sec || 0;
                    
                    document.getElementById('viewerScore').textContent = newScore;
                    document.getElementById('tapsPerSec').textContent = tps + ' taps/sec';
                    
                    // Visual pulse on update
                    const scoreEl = document.getElementById('viewerScore');
                    scoreEl.style.transform = 'scale(1.1)';
                    setTimeout(() => scoreEl.style.transform = 'scale(1)', 100);
                })
                .subscribe();
            
            // Get initial score
            supabase
                .from('tap_rooms')
                .select('score')
                .eq('code', roomCode)
                .single()
                .then(({ data }) => {
                    if (data) {
                        document.getElementById('viewerScore').textContent = data.score;
                    }
                });
        }
        
        function resetGame() {
            // Cleanup
            if (subscription) {
                supabase.removeChannel(subscription);
                subscription = null;
            }
            
            // Delete room if host
            if (currentMode === 'host' && roomCode) {
                supabase.from('tap_rooms').delete().eq('code', roomCode);
            }
            
            // Reset state
            score = 0;
            roomCode = null;
            tapTimes = [];
            
            // Reset UI
            document.getElementById('hostGame').classList.remove('active');
            document.getElementById('viewerGame').classList.remove('active');
            document.getElementById('hostSetup').classList.add('active');
            document.getElementById('hostScore').textContent = '0';
            document.getElementById('viewerScore').textContent = '0';
            document.getElementById('codeInput').value = '';
        }
        
        // Prevent zoom on double tap
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
    </script>
</body>
</html>
