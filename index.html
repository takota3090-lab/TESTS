<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>لعبة الرسم - تخمين الصور | تصميم سعود</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Tajawal', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .join-screen, .game-screen {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    
    .join-screen {
      max-width: 500px;
      margin: 50px auto;
      text-align: center;
    }
    
    .game-screen {
      display: none;
    }
    
    h1 {
      color: #667eea;
      margin-bottom: 10px;
      font-size: 2rem;
    }
    
    .subtitle {
      color: #666;
      margin-bottom: 30px;
    }
    
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 16px;
      font-family: 'Tajawal', sans-serif;
      text-align: center;
    }
    
    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin: 10px 5px;
      transition: transform 0.2s;
    }
    
    button:hover {
      transform: translateY(-2px);
    }
    
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .game-layout {
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 20px;
    }
    
    .drawing-area {
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }
    
    canvas {
      border: 3px solid #ddd;
      border-radius: 10px;
      cursor: crosshair;
      background: white;
      width: 100%;
      height: auto;
    }
    
    .drawing-tools {
      margin-top: 15px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .tool-btn {
      background: #f0f0f0;
      color: #333;
      padding: 8px 15px;
      font-size: 14px;
    }
    
    .tool-btn.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .color-picker {
      width: 40px;
      height: 40px;
      border: 2px solid #ddd;
      border-radius: 50%;
      cursor: pointer;
    }
    
    .chat-area {
      background: white;
      border-radius: 20px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      height: 600px;
    }
    
    .current-word {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      margin-bottom: 15px;
    }
    
    .current-word h3 {
      font-size: 12px;
      opacity: 0.9;
      margin-bottom: 5px;
    }
    
    .word-display {
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 2px;
    }
    
    .messages {
      flex: 1;
      overflow-y: auto;
      margin: 15px 0;
      padding: 10px;
      background: #f9f9f9;
      border-radius: 10px;
    }
    
    .message {
      padding: 8px 12px;
      margin: 5px 0;
      background: white;
      border-radius: 10px;
      animation: fadeIn 0.3s;
    }
    
    .message.correct {
      background: #d4edda;
      color: #155724;
      border-right: 4px solid #28a745;
    }
    
    .message.system {
      background: #e2e3e5;
      color: #383d41;
      text-align: center;
      font-size: 12px;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .guess-input-area {
      display: flex;
      gap: 10px;
    }
    
    .guess-input {
      flex: 1;
      text-align: right;
    }
    
    .players-list {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 2px solid #eee;
    }
    
    .players-list h4 {
      margin-bottom: 10px;
      color: #667eea;
    }
    
    .player-item {
      padding: 5px;
      margin: 3px 0;
      background: #f0f0f0;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
    }
    
    .player-item.host {
      background: #ffe6b3;
      font-weight: bold;
    }
    
    .score {
      color: #667eea;
      font-weight: bold;
    }
    
    .room-info {
      background: #f0f0f0;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 15px;
      text-align: center;
    }
    
    .room-code {
      font-size: 24px;
      font-weight: bold;
      color: #667eea;
      font-family: monospace;
      background: white;
      padding: 5px 15px;
      border-radius: 8px;
      display: inline-block;
      margin: 0 10px;
    }
    
    .timer {
      font-size: 18px;
      font-weight: bold;
      color: #ffc107;
      margin-top: 5px;
    }
    
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 10px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    @media (max-width: 768px) {
      .game-layout {
        grid-template-columns: 1fr;
      }
      .chat-area {
        height: 400px;
      }
      .drawing-area {
        order: 2;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <!-- Join Screen -->
  <div id="joinScreen" class="join-screen">
    <i class="fas fa-paint-brush" style="font-size: 50px; color: #667eea;"></i>
    <h1>🎨 لعبة الرسم والتخمين</h1>
    <p class="subtitle">ارسم وصديقك يخمن! العب مع الأصدقاء مباشرة</p>
    
    <input type="text" id="playerName" placeholder="اسمك" value="لاعب">
    <input type="text" id="roomCodeInput" placeholder="رمز الغرفة (اتركه فارغاً لإنشاء غرفة جديدة)">
    
    <button id="joinOrCreateBtn">🚀 دخول / إنشاء غرفة</button>
    
    <div id="joinError" style="color: red; margin-top: 10px;"></div>
  </div>
  
  <!-- Game Screen -->
  <div id="gameScreen" class="game-screen">
    <div class="room-info">
      <span>🏠 رمز الغرفة: </span>
      <span id="roomCodeDisplay" class="room-code"></span>
      <button id="copyRoomBtn" style="background: #28a745; padding: 5px 15px; margin: 0 10px;">📋 نسخ</button>
      <span id="playerRole" style="margin-right: 20px;"></span>
    </div>
    
    <div class="game-layout">
      <!-- Drawing Area -->
      <div class="drawing-area">
        <canvas id="drawCanvas" width="800" height="500" style="width:100%; height:auto; max-width:800px; aspect-ratio:800/500"></canvas>
        
        <div class="drawing-tools">
          <button class="tool-btn" id="penBtn"><i class="fas fa-pen"></i> قلم</button>
          <button class="tool-btn" id="eraserBtn"><i class="fas fa-eraser"></i> ممحاة</button>
          <button class="tool-btn" id="clearBtn"><i class="fas fa-trash"></i> مسح الكل</button>
          <input type="color" id="colorPicker" value="#000000" class="color-picker">
          <input type="range" id="brushSize" min="2" max="20" value="5" style="width: 100px;">
        </div>
      </div>
      
      <!-- Chat Area -->
      <div class="chat-area">
        <div class="current-word">
          <h3>🎯 الكلمة الحالية</h3>
          <div class="word-display" id="currentWordDisplay">???</div>
          <div class="timer" id="timerDisplay">⏱️ انتظر بدء الجولة</div>
        </div>
        
        <div class="messages" id="messages">
          <div class="message system">✨ مرحباً! انتظر بدء اللعبة...</div>
        </div>
        
        <div class="guess-input-area">
          <input type="text" id="guessInput" class="guess-input" placeholder="اكتب تخمينك هنا...">
          <button id="sendGuessBtn">💬 أرسل</button>
        </div>
        
        <div class="players-list">
          <h4><i class="fas fa-users"></i> اللاعبون (<span id="playerCount">0</span>)</h4>
          <div id="playersList"></div>
        </div>
        
        <button id="nextRoundBtn" style="background: #28a745; width: 100%; margin-top: 10px;">🎯 ابدأ الجولة</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, update, push, onChildAdded, get } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
  
  // Firebase Config
  const firebaseConfig = {
    apiKey: "AIzaSyDEwWDRWOZ13iK_iDPqUymNlhgz9R4nmXY",
    authDomain: "gameapp-3fd40.firebaseapp.com",
    projectId: "gameapp-3fd40",
    storageBucket: "gameapp-3fd40.firebasestorage.app",
    messagingSenderId: "216038176025",
    appId: "1:216038176025:web:d73fc67524770decbc8188"
  };
  
  console.log("Initializing Firebase...");
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  console.log("Firebase initialized successfully!");
  
  // Game Words
  const words = [
    "قطة", "كلب", "شمس", "قمر", "سيارة", "طائرة", "بيت", "شجرة", "زهرة", "سمكة",
    "تفاحة", "موزة", "برتقال", "فراشة", "نحلة", "أسد", "فيل", "زرافة", "بحر", "جبل",
    "نجمة", "قلب", "سحابة", "مطر", "قوس قزح", "ساعة", "كتاب", "قلم", "كرسي", "طاولة"
  ];
  
  let currentUser = {
    id: null,
    name: null,
    roomId: null,
    isHost: false
  };
  
  let drawingEnabled = false;
  let isDrawing = false;
  let lastX = 0, lastY = 0;
  let canvas, ctx;
  let currentWord = "";
  let roundActive = false;
  let roundTime = 60;
  let timerInterval = null;
  let players = {};
  let hostId = null;
  
  // Initialize canvas
  function initCanvas() {
    canvas = document.getElementById('drawCanvas');
    ctx = canvas.getContext('2d');
    canvas.width = 800;
    canvas.height = 500;
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = 'black';
    
    // Drawing events
    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mouseleave', stopDrawing);
    
    // Touch events for mobile
    canvas.addEventListener('touchstart', startDrawingTouch);
    canvas.addEventListener('touchmove', drawTouch);
    canvas.addEventListener('touchend', stopDrawing);
  }
  
  function startDrawing(e) {
    if (!drawingEnabled) return;
    isDrawing = true;
    const pos = getMousePos(e);
    lastX = pos.x;
    lastY = pos.y;
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(lastX, lastY);
    ctx.stroke();
  }
  
  function draw(e) {
    if (!isDrawing || !drawingEnabled) return;
    e.preventDefault();
    const pos = getMousePos(e);
    const brushSize = document.getElementById('brushSize').value;
    ctx.lineWidth = brushSize;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = document.getElementById('colorPicker').value;
    
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    
    lastX = pos.x;
    lastY = pos.y;
    
    // Save drawing to Firebase
    if (currentUser.isHost && currentUser.roomId) {
      const imageData = canvas.toDataURL();
      update(ref(db, `rooms/${currentUser.roomId}/drawing`), { data: imageData });
    }
  }
  
  function startDrawingTouch(e) {
    e.preventDefault();
    if (!drawingEnabled) return;
    isDrawing = true;
    const pos = getTouchPos(e);
    lastX = pos.x;
    lastY = pos.y;
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(lastX, lastY);
    ctx.stroke();
  }
  
  function drawTouch(e) {
    e.preventDefault();
    if (!isDrawing || !drawingEnabled) return;
    const pos = getTouchPos(e);
    const brushSize = document.getElementById('brushSize').value;
    ctx.lineWidth = brushSize;
    ctx.lineCap = 'round';
    ctx.strokeStyle = document.getElementById('colorPicker').value;
    
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    
    lastX = pos.x;
    lastY = pos.y;
    
    if (currentUser.isHost && currentUser.roomId) {
      const imageData = canvas.toDataURL();
      update(ref(db, `rooms/${currentUser.roomId}/drawing`), { data: imageData });
    }
  }
  
  function stopDrawing() {
    isDrawing = false;
  }
  
  function getMousePos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    return {
      x: (e.clientX - rect.left) * scaleX,
      y: (e.clientY - rect.top) * scaleY
    };
  }
  
  function getTouchPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const touch = e.touches[0];
    return {
      x: (touch.clientX - rect.left) * scaleX,
      y: (touch.clientY - rect.top) * scaleY
    };
  }
  
  function clearCanvas() {
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (currentUser.isHost && currentUser.roomId) {
      const imageData = canvas.toDataURL();
      update(ref(db, `rooms/${currentUser.roomId}/drawing`), { data: imageData });
    }
  }
  
  function loadDrawing(imageData) {
    const img = new Image();
    img.onload = () => {
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    };
    img.src = imageData;
  }
  
  function getRandomWord() {
    return words[Math.floor(Math.random() * words.length)];
  }
  
  function startRound() {
    if (!currentUser.isHost) return;
    
    const newWord = getRandomWord();
    currentWord = newWord;
    roundActive = true;
    roundTime = 60;
    
    update(ref(db, `rooms/${currentUser.roomId}/game`), {
      currentWord: newWord,
      roundActive: true,
      roundTime: 60,
      lastUpdate: Date.now()
    });
    
    clearCanvas();
    
    addMessage(`🎨 الجولة الجديدة!`, 'system');
    addMessage(`🖌️ ابدأ الرسم! الوقت: 60 ثانية`, 'system');
    
    startTimer();
  }
  
  function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    
    timerInterval = setInterval(() => {
      if (roundActive && roundTime > 0) {
        roundTime--;
        document.getElementById('timerDisplay').innerHTML = `⏱️ ${roundTime} ثانية`;
        
        if (currentUser.isHost) {
          update(ref(db, `rooms/${currentUser.roomId}/game`), { roundTime: roundTime });
        }
        
        if (roundTime <= 0) {
          clearInterval(timerInterval);
          roundActive = false;
          addMessage(`⏰ انتهى الوقت! الكلمة كانت: ${currentWord}`, 'system');
          if (currentUser.isHost) {
            update(ref(db, `rooms/${currentUser.roomId}/game`), { roundActive: false });
          }
          drawingEnabled = false;
        }
      }
    }, 1000);
  }
  
  function addMessage(text, type = 'system', playerName = '') {
    const messagesDiv = document.getElementById('messages');
    const messageDiv = document.createElement('div');
    messageDiv.className = `message ${type}`;
    
    if (type === 'correct') {
      messageDiv.innerHTML = `<strong>🎉 ${playerName}</strong> خمن الكلمة! +10 نقاط`;
    } else if (type === 'normal') {
      messageDiv.innerHTML = `<strong>${playerName}</strong>: ${text}`;
    } else {
      messageDiv.innerHTML = text;
    }
    
    messagesDiv.appendChild(messageDiv);
    messageDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
    
    // Keep only last 50 messages
    while (messagesDiv.children.length > 50) {
      messagesDiv.removeChild(messagesDiv.firstChild);
    }
  }
  
  function checkGuess(guess, playerId, playerName) {
    if (!roundActive) return false;
    if (guess.toLowerCase() === currentWord.toLowerCase()) {
      // Correct guess!
      addMessage(`🎉 ${playerName} خمن الكلمة! +10 نقاط`, 'correct', playerName);
      
      // Update player score
      const newScore = (players[playerId]?.score || 0) + 10;
      update(ref(db, `rooms/${currentUser.roomId}/players/${playerId}`), { score: newScore });
      
      // End round
      roundActive = false;
      if (timerInterval) clearInterval(timerInterval);
      
      if (currentUser.isHost) {
        update(ref(db, `rooms/${currentUser.roomId}/game`), { roundActive: false });
      }
      
      drawingEnabled = false;
      return true;
    }
    return false;
  }
  
  // Firebase Listeners
  function listenToRoom(roomId) {
    console.log("Listening to room:", roomId);
    
    // Listen to game state
    const gameRef = ref(db, `rooms/${roomId}/game`);
    onValue(gameRef, (snapshot) => {
      const game = snapshot.val();
      if (game) {
        currentWord = game.currentWord;
        roundActive = game.roundActive;
        roundTime = game.roundTime;
        
        if (currentUser.isHost) {
          document.getElementById('currentWordDisplay').innerHTML = currentWord;
        } else {
          document.getElementById('currentWordDisplay').innerHTML = '???';
        }
        document.getElementById('timerDisplay').innerHTML = roundActive ? `⏱️ ${roundTime} ثانية` : '⏸️ في انتظار الجولة';
        
        if (currentUser.isHost && roundActive) {
          drawingEnabled = true;
        } else if (!currentUser.isHost) {
          drawingEnabled = false;
        }
      }
    });
    
    // Listen to drawing
    const drawingRef = ref(db, `rooms/${roomId}/drawing`);
    onValue(drawingRef, (snapshot) => {
      const drawing = snapshot.val();
      if (drawing && drawing.data && !currentUser.isHost) {
        loadDrawing(drawing.data);
      }
    });
    
    // Listen to players
    const playersRef = ref(db, `rooms/${roomId}/players`);
    onValue(playersRef, (snapshot) => {
      players = snapshot.val() || {};
      updatePlayersList();
    });
    
    // Listen to messages
    const messagesRef = ref(db, `rooms/${roomId}/messages`);
    onChildAdded(messagesRef, (snapshot) => {
      const msg = snapshot.val();
      if (msg && msg.playerId !== currentUser.id) {
        if (msg.type === 'guess') {
          addMessage(msg.text, 'normal', msg.playerName);
        } else if (msg.type === 'correct') {
          addMessage(`🎉 ${msg.playerName} خمن الكلمة! +10 نقاط`, 'correct');
        }
      }
    });
  }
  
  function updatePlayersList() {
    const playersDiv = document.getElementById('playersList');
    const playerCount = Object.keys(players).length;
    document.getElementById('playerCount').innerText = playerCount;
    
    playersDiv.innerHTML = Object.entries(players).map(([id, player]) => `
      <div class="player-item ${hostId === id ? 'host' : ''}">
        <span>${player.name} ${hostId === id ? '👑' : ''}</span>
        <span class="score">⭐ ${player.score || 0}</span>
      </div>
    `).join('');
  }
  
  // Create or Join Room
  async function createOrJoinRoom() {
    const playerName = document.getElementById('playerName').value.trim() || 'لاعب';
    const roomCode = document.getElementById('roomCodeInput').value.trim().toUpperCase();
    
    currentUser.name = playerName;
    currentUser.id = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
    
    const btn = document.getElementById('joinOrCreateBtn');
    btn.innerHTML = '<span class="loading"></span> جاري الاتصال...';
    btn.disabled = true;
    
    try {
      if (!roomCode) {
        // Create new room
        console.log("Creating new room...");
        currentUser.roomId = Math.random().toString(36).substring(2, 8).toUpperCase();
        currentUser.isHost = true;
        hostId = currentUser.id;
        
        const initialWord = getRandomWord();
        
        const roomData = {
          hostId: currentUser.id,
          createdAt: Date.now(),
          game: {
            currentWord: initialWord,
            roundActive: false,
            roundTime: 60
          },
          players: {
            [currentUser.id]: {
              name: playerName,
              score: 0,
              joinedAt: Date.now()
            }
          },
          drawing: { data: null },
          messages: {}
        };
        
        await set(ref(db, `rooms/${currentUser.roomId}`), roomData);
        console.log("Room created:", currentUser.roomId);
        
      } else {
        // Join existing room
        console.log("Joining room:", roomCode);
        currentUser.roomId = roomCode;
        currentUser.isHost = false;
        
        const roomRef = ref(db, `rooms/${roomCode}`);
        const snapshot = await get(roomRef);
        
        if (!snapshot.exists()) {
          throw new Error("الغرفة غير موجودة");
        }
        
        const roomData = snapshot.val();
        hostId = roomData.hostId;
        
        // Add player to room
        await update(ref(db, `rooms/${roomCode}/players/${currentUser.id}`), {
          name: playerName,
          score: 0,
          joinedAt: Date.now()
        });
        
        console.log("Joined room successfully!");
      }
      
      // Switch to game screen
      document.getElementById('joinScreen').style.display = 'none';
      document.getElementById('gameScreen').style.display = 'block';
      document.getElementById('roomCodeDisplay').innerHTML = currentUser.roomId;
      document.getElementById('playerRole').innerHTML = currentUser.isHost ? '👑 المضيف (الرسام)' : '🎨 مشاهد (مخمن)';
      
      initCanvas();
      listenToRoom(currentUser.roomId);
      
      if (currentUser.isHost) {
        drawingEnabled = true;
        document.getElementById('nextRoundBtn').style.display = 'block';
      } else {
        drawingEnabled = false;
        document.getElementById('nextRoundBtn').style.display = 'block';
      }
      
      // Setup send message
      document.getElementById('sendGuessBtn').onclick = sendGuess;
      document.getElementById('guessInput').onkeypress = (e) => {
        if (e.key === 'Enter') sendGuess();
      };
      
      // Setup next round button
      document.getElementById('nextRoundBtn').onclick = () => {
        if (currentUser.isHost) {
          startRound();
        } else {
          addMessage('⚠️ فقط المضيف يمكنه بدء الجولة', 'system');
        }
      };
      
      // Setup tools
      document.getElementById('penBtn').onclick = () => {
        drawingEnabled = true;
        document.getElementById('penBtn').classList.add('active');
        document.getElementById('eraserBtn').classList.remove('active');
      };
      document.getElementById('eraserBtn').onclick = () => {
        drawingEnabled = true;
        document.getElementById('eraserBtn').classList.add('active');
        document.getElementById('penBtn').classList.remove('active');
        document.getElementById('colorPicker').value = '#ffffff';
      };
      document.getElementById('clearBtn').onclick = () => {
        if (confirm('مسح الرسمة؟')) {
          clearCanvas();
        }
      };
      document.getElementById('colorPicker').onchange = (e) => {
        if (document.getElementById('eraserBtn').classList.contains('active')) {
          document.getElementById('penBtn').click();
        }
      };
      
      // Copy room button
      document.getElementById('copyRoomBtn').onclick = () => {
        navigator.clipboard.writeText(currentUser.roomId);
        alert('✅ تم نسخ رمز الغرفة: ' + currentUser.roomId);
      };
      
      // Set pen as active by default
      document.getElementById('penBtn').click();
      
    } catch (error) {
      console.error("Error:", error);
      document.getElementById('joinError').innerHTML = '❌ ' + error.message;
      btn.innerHTML = '🚀 دخول / إنشاء غرفة';
      btn.disabled = false;
    }
  }
  
  async function sendGuess() {
    const guess = document.getElementById('guessInput').value.trim();
    if (!guess) return;
    
    if (!roundActive) {
      addMessage('⚠️ لا توجد جولة نشطة حالياً!', 'system');
      document.getElementById('guessInput').value = '';
      return;
    }
    
    // Check if guess is correct
    if (checkGuess(guess, currentUser.id, currentUser.name)) {
      // Save correct guess to Firebase
      const messagesRef = ref(db, `rooms/${currentUser.roomId}/messages`);
      push(messagesRef, {
        playerId: currentUser.id,
        playerName: currentUser.name,
        text: guess,
        type: 'correct',
        timestamp: Date.now()
      });
      
      document.getElementById('guessInput').value = '';
      return;
    }
    
    // Save guess to Firebase
    const messagesRef = ref(db, `rooms/${currentUser.roomId}/messages`);
    push(messagesRef, {
      playerId: currentUser.id,
      playerName: currentUser.name,
      text: guess,
      type: 'guess',
      timestamp: Date.now()
    });
    
    addMessage(guess, 'normal', currentUser.name);
    document.getElementById('guessInput').value = '';
  }
  
  // Event Listeners
  document.getElementById('joinOrCreateBtn').onclick = createOrJoinRoom;
  
  // Enter key on room code
  document.getElementById('roomCodeInput').onkeypress = (e) => {
    if (e.key === 'Enter') createOrJoinRoom();
  };
  
  // Enter key on player name
  document.getElementById('playerName').onkeypress = (e) => {
    if (e.key === 'Enter') createOrJoinRoom();
  };
</script>
</body>
</html>
