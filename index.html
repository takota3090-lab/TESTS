<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المصمم سعود | مطور تطبيقات ويب</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold: #d4a86c;
      --gold-light: #f5e7d3;
      --dark: #0a0e0d;
      --card: rgba(255,255,255,0.03);
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--dark);
      color: var(--gold-light);
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Animated Background */
    .bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: 
        radial-gradient(circle at 20% 50%, rgba(212,168,100,0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 50%, rgba(212,168,100,0.05) 0%, transparent 50%),
        var(--dark);
    }

    .bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: 
        radial-gradient(rgba(212,168,100,0.1) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
    }

    /* Floating Orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      animation: float 15s infinite ease-in-out;
    }

    .orb-1 {
      width: 300px;
      height: 300px;
      background: var(--gold);
      top: 10%;
      right: 10%;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 200px;
      height: 200px;
      background: var(--gold);
      bottom: 10%;
      left: 10%;
      animation-delay: -7s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0,0) scale(1); }
      50% { transform: translate(-20px, 20px) scale(1.1); }
    }

    /* Main Container */
    .container {
      text-align: center;
      max-width: 800px;
      padding: 40px;
      position: relative;
      z-index: 1;
    }

    /* Name */
    .name {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 900;
      margin-bottom: 10px;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: fadeInUp 0.8s ease-out 0.1s both;
    }

    /* Title */
    .title {
      font-size: 1.1rem;
      color: var(--gold);
      font-weight: 600;
      margin-bottom: 25px;
      letter-spacing: 2px;
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }

    /* Description */
    .description {
      font-size: 1.1rem;
      line-height: 1.8;
      color: rgba(245,231,211,0.8);
      max-width: 600px;
      margin: 0 auto 40px;
      animation: fadeInUp 0.8s ease-out 0.3s both;
    }

    /* أعمالي القسم */
    .portfolio-section {
      margin-bottom: 30px;
      animation: fadeInUp 0.8s ease-out 0.35s both;
    }

    .section-label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 20px;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 1px;
    }

    .section-label i {
      font-size: 1.2rem;
    }

    .section-label::before,
    .section-label::after {
      content: '';
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    /* Work Buttons */
    .works {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .work-btn {
      background: var(--card);
      border: 1px solid rgba(212,168,100,0.2);
      color: var(--gold-light);
      padding: 15px 30px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .work-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(212,168,100,0.2), transparent);
      transition: left 0.5s;
    }

    .work-btn:hover::before {
      left: 100%;
    }

    .work-btn:hover {
      border-color: var(--gold);
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(212,168,100,0.15);
    }

    .work-btn i {
      font-size: 1.1rem;
      color: var(--gold);
    }

    /* Contact Button */
    .contact-btn {
      background: var(--gold);
      color: var(--dark);
      border: none;
      padding: 18px 50px;
      border-radius: 50px;
      font-family: inherit;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(212,168,100,0.3);
      animation: fadeInUp 0.8s ease-out 0.5s both;
      text-decoration: none;
    }

    .contact-btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 15px 40px rgba(212,168,100,0.4);
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }
      
      .works {
        flex-direction: column;
        align-items: center;
      }
      
      .work-btn {
        width: 100%;
        max-width: 280px;
        justify-content: center;
      }
      
      .section-label::before,
      .section-label::after {
        width: 20px;
      }
    }
  </style>
  <base target="_blank">
</head>
<body>
  <div class="bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <main class="container">
    <h1 class="name">المصمم سعود</h1>
    <div class="title">مطور تطبيقات وصفحات ويب تفاعلية</div>
    
    <p class="description">
      أقوم بتحويل أفكارك إلى تطبيقات وصفحات ويب تفاعلية بالكامل.<br><br>
      أصمم بناءً على طلباتك: تطبيق خاص بك، ألعابًا تفاعلية، دعوات عشاء إلكترونية، وأي فكرة إبداعية ترغب في تنفيذها.
    </p>

    <!-- قسم إستعرض أعمالي مع العنوان -->
    <div class="portfolio-section">
      <div class="section-label">
        <i class="fas fa-star-of-life"></i>
        <span>إستعرض أعمالي</span>
        <i class="fas fa-star-of-life"></i>
      </div>
      
      <div class="works">
        <a href="https://takota3090-lab.github.io/malak-shark-game/" target="_blank" class="work-btn">
          <i class="fas fa-mobile-alt"></i>
          <span>تطبيق خاص</span>
        </a>
        
        <a href="https://takota3090-lab.github.io/invitation/" target="_blank" class="work-btn">
          <i class="fas fa-envelope-open"></i>
          <span>دعوة إلكترونية</span>
        </a>
        
        <a href="https://takota3090-lab.github.io/charades/" target="_blank" class="work-btn">
          <i class="fas fa-theater-masks"></i>
          <span>لعبة تمثيل</span>
        </a>
      </div>
    </div>

    <a href="https://wa.me/966560980666" class="contact-btn">
      <span>تواصل معي</span>
      <i class="fas fa-paper-plane"></i>
    </a>
  </main>

  <script>
    // Add hover tilt effect to buttons
    document.querySelectorAll('.work-btn, .contact-btn').forEach(btn => {
      btn.addEventListener('mousemove', (e) => {
        const rect = btn.getBoundingClientRect();
        const x = e.clientX - rect.left - rect.width / 2;
        const y = e.clientY - rect.top - rect.height / 2;
        btn.style.transform = `translate(${x * 0.1}px, ${y * 0.1}px)`;
      });
      
      btn.addEventListener('mouseleave', () => {
        btn.style.transform = 'translate(0, 0)';
      });
    });
  </script>
</body>
</html>
